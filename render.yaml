services:
  # Monolithic Seaflow Application (API + Frontend)
  - type: web
    name: seaflow-production
    env: node
    plan: free
    region: oregon 
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        value: a-oiem-api-db-mysql-service-a-oiem-api-db.d.aivencloud.com
      - key: DB_PORT
        value: 26213
      - key: DB_USER
        value: avnadmin
      - key: DB_PASS
        fromConfig: DB_PASS # To be set in Render Dashboard
      - key: DB_NAME
        value: seaflow-db
      - key: FRONTEND_URL
        value: https://seaflow.onrender.com
      - key: VITE_API_URL
        value: https://seaflow.onrender.com/api

